<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>枫车X德安通新品发布会邀请函</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: "Microsoft Yahei", sans-serif;
            background-color: #001540;
        }
        /* 封面页样式 */
        .cover-page {
            width: 100%;
            min-height: 100vh;
            background: url("https://p3-flow-imagex-download-sign.byteimg.com/tos-cn-i-a9rns2rl98/a3f959168227488eb995f8b10838449d.png~tplv-a9rns2rl98-24:720:720.png?lk3s=8e244e95&rcl=202603041436030FF8AD4151AA36750946&rrcfp=8a172a1a&x-expires=1773210964&x-signature=r4EYLBD03SRPw9fKDL24Dc%2Fi6as%3D") no-repeat center;
            background-size: cover;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-end;
            padding-bottom: 80px;
        }
        .join-btn {
            width: 80%;
            height: 50px;
            background-color: #007AFF;
            color: white;
            border: none;
            border-radius: 25px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.3);
        }
        .join-btn:active {
            background-color: #0066CC;
        }
        /* 表单页样式 */
        .form-page {
            width: 100%;
            min-height: 100vh;
            background: url("https://p3-flow-imagex-download-sign.byteimg.com/tos-cn-i-a9rns2rl98/7b903f10f5c041b498b65b9355fccfc0.png~tplv-a9rns2rl98-24:720:720.png?lk3s=8e244e95&rcl=202603041436030FF8AD4151AA36750946&rrcfp=8a172a1a&x-expires=1773210964&x-signature=l%2FLxH7uaMQvSeQLB0YEp08zaABM%3D") no-repeat center;
            background-size: cover;
            padding: 20px;
            display: none; /* 默认隐藏表单页 */
        }
        .form-container {
            background-color: white;
            border-radius: 15px;
            padding: 30px 20px;
            margin-top: 20px;
        }
        .form-item {
            margin-bottom: 25px;
        }
        .form-item label {
            display: block;
            font-size: 18px;
            color: #333;
            margin-bottom: 8px;
        }
        .form-item input {
            width: 100%;
            height: 45px;
            border: 1px solid #ccc;
            border-radius: 8px;
            padding: 0 15px;
            font-size: 16px;
        }
        .radio-group {
            display: flex;
            gap: 20px;
            margin-top: 8px;
        }
        .radio-group label {
            display: flex;
            align-items: center;
            gap: 5px;
            margin-bottom: 0;
        }
        .select-box {
            width: 100%;
            height: 45px;
            border: 1px solid #ccc;
            border-radius: 8px;
            padding: 0 15px;
            font-size: 16px;
            background-color: white;
        }
        .textarea {
            width: 100%;
            min-height: 100px;
            border: 1px solid #ccc;
            border-radius: 8px;
            padding: 15px;
            font-size: 16px;
            resize: none;
        }
        .submit-btn {
            width: 100%;
            height: 50px;
            background-color: #00C853;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 10px;
        }
        .submit-btn:active {
            background-color: #00B248;
        }
        /* 提示弹窗 */
        .modal {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background-color: white;
            padding: 20px 30px;
            border-radius: 10px;
            font-size: 18px;
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.3);
            display: none;
            z-index: 999;
        }
    </style>
</head>
<body>
    <!-- 封面页 -->
    <div class="cover-page" id="coverPage">
        <button class="join-btn" id="joinBtn">确认参加</button>
    </div>

    <!-- 表单页 -->
    <div class="form-page" id="formPage">
        <div class="form-container">
            <div class="form-item">
                <label for="name">姓名</label>
                <input type="text" id="name" placeholder="请输入您的姓名">
            </div>
            <div class="form-item">
                <label for="phone">电话</label>
                <input type="tel" id="phone" placeholder="请输入您的手机号码">
            </div>
            <div class="form-item">
                <label>是否参加</label>
                <div class="radio-group">
                    <label>
                        <input type="radio" name="isJoin" value="是"> 是
                    </label>
                    <label>
                        <input type="radio" name="isJoin" value="否"> 否
                    </label>
                </div>
            </div>
            <div class="form-item">
                <label for="peopleNum">参加人数</label>
                <select class="select-box" id="peopleNum">
                    <option value="">请选择参加人数</option>
                    <option value="1">1人</option>
                    <option value="2">2人</option>
                    <option value="3">3人</option>
                    <option value="4">4人</option>
                </select>
            </div>
            <div class="form-item">
                <label for="remark">备注</label>
                <textarea class="textarea" id="remark" placeholder="请输入备注信息（选填）"></textarea>
            </div>
            <button class="submit-btn" id="submitBtn">确认提交</button>
        </div>
    </div>

    <!-- 提示弹窗 -->
    <div class="modal" id="modal">提交成功！我们会尽快与您联系。</div>

    <script>
        // 获取元素
        const coverPage = document.getElementById('coverPage');
        const formPage = document.getElementById('formPage');
        const joinBtn = document.getElementById('joinBtn');
        const submitBtn = document.getElementById('submitBtn');
        const modal = document.getElementById('modal');

        // 点击确认参加，切换到表单页
        joinBtn.addEventListener('click', function() {
            coverPage.style.display = 'none';
            formPage.style.display = 'block';
        });

        // 提交表单逻辑
        submitBtn.addEventListener('click', function() {
            const name = document.getElementById('name').value;
            const phone = document.getElementById('phone').value;
            const isJoin = document.querySelector('input[name="isJoin"]:checked')?.value;
            const peopleNum = document.getElementById('peopleNum').value;

            // 简单验证必填项
            if (!name) {
                alert('请输入姓名');
                return;
            }
            if (!phone || !/^1[3-9]\d{9}$/.test(phone)) {
                alert('请输入正确的手机号码');
                return;
            }
            if (!isJoin) {
                alert('请选择是否参加');
                return;
            }
            if (isJoin === '是' && !peopleNum) {
                alert('请选择参加人数');
                return;
            }

            // 显示提交成功弹窗
            modal.style.display = 'block';
            
            // 2秒后关闭弹窗（模拟提交成功后的反馈）
            setTimeout(function() {
                modal.style.display = 'none';
                // 可选：重置表单
                document.getElementById('name').value = '';
                document.getElementById('phone').value = '';
                document.querySelectorAll('input[name="isJoin"]').forEach(radio => radio.checked = false);
                document.getElementById('peopleNum').value = '';
                document.getElementById('remark').value = '';
            }, 2000);

            // 实际项目中，这里可以添加AJAX请求，把表单数据提交到后端
            // 示例：
            // fetch('你的后端接口地址', {
            //     method: 'POST',
            //     body: JSON.stringify({
            //         name, phone, isJoin, peopleNum, remark: document.getElementById('remark').value
            //     }),
            //     headers: {
            //         'Content-Type': 'application/json'
            //     }
            // }).then(res => res.json()).then(data => {
            //     // 处理后端返回结果
            // });
        });
    </script>
</body>
</html>
